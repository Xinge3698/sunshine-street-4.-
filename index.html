<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阳光商业街区</title>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100%; height: 100vh; background: #1a1a2e; font-family: sans-serif; overflow: hidden; }
        .header { padding: 12px; text-align: center; background: #fff; border-bottom: 1px solid #ddd; }
        .header h3 { color: #333; font-size: 16px; }
        .map-frame { width: 100%; height: calc(100vh - 80px); border: none; }
        .cities { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center; padding: 0 10px; }
        .btn { padding: 8px 14px; background: #ff6b6b; color: #fff; border: none; border-radius: 18px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <h3>🏪 阳光商业街区</h3>
    </div>
    <iframe id="mapFrame" class="map-frame" src=""></iframe>
    <div class="cities">
        <button class="btn" onclick="openMap(1, '长沙')">长沙</button>
        <button class="btn" onclick="openMap(2, '北京')">北京</button>
        <button class="btn" onclick="openMap(3, '上海')">上海</button>
        <button class="btn" onclick="openMap(4, '深圳')">深圳</button>
    </div>
    <script>
        var maps = {
            1: 'https://restapi.amap.com/v3/staticmap?location=112.9388,28.2282&zoom=16&size=750*1000&markers=mid,,A:112.9388,28.2282&key=e44748ba0a1c2abb6708abc84c853e28',
            2: 'https://restapi.amap.com/v3/staticmap?location=116.4074,39.9042&zoom=15&size=750*1000&markers=mid,,A:116.4074,39.9042&key=e44748ba0a1c2abb6708abc84c853e28',
            3: 'https://restapi.amap.com/v3/staticmap?location=121.4737,31.2304&zoom=15&size=750*1000&markers=mid,,A:121.4737,31.2304&key=e44748ba0a1c2abb6708abc84c853e28',
            4: 'https://restapi.amap.com/v3/staticmap?location=114.0579,22.5431&zoom=15&size=750*1000&markers=mid,,A:114.0579,22.5431&key=e44748ba0a1c2abb6708abc84c853e28'
        };
        var mapFrame = document.getElementById('mapFrame');
        function openMap(num, name) {
            document.querySelector('.header h3').textContent = '🏪 ' + name + '商业街';
            mapFrame.src = maps[num];
        }
        openMap(1, '长沙');
    </script>
</body>
</html>
