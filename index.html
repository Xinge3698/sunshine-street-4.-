<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阳光商业街区街景</title>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100%; height: 100vh; background: #1a1a2e; font-family: sans-serif; }
        #pano { width: 100%; height: 100%; }
        .info { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; font-size: 14px; color: #fff; z-index: 100; }
        .cities { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 10px 16px; background: rgba(255,107,107,0.9); border: none; color: #fff; border-radius: 20px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="info" id="info">🏪 阳光商业街区</div>
    <div id="pano"></div>
    <div class="cities">
        <button class="btn" onclick="switchCity(116.409,39.915,'北京王府井')">北京</button>
        <button class="btn" onclick="switchCity(121.487,31.234,'上海南京路')">上海</button>
        <button class="btn" onclick="switchCity(114.059,22.543,'深圳东门')">深圳</button>
        <button class="btn" onclick="switchCity(112.938,28.228,'长沙黄兴路')">长沙</button>
    </div>

    <script>
        function switchCity(lng, lat, name) {
            document.getElementById('info').textContent = '🏪 ' + name;
            document.getElementById('pano').innerHTML = '<iframe width="100%" height="100%" frameborder="0" src="https://map.baidu.com/ugc/photo/photo/list?qt=panorama&uid=' + lng + ',' + lat + '&heading=&pitch=&zoom=1" style="border:none;"></iframe>';
        }
        switchCity(116.409,39.915,'北京王府井');
    </script>
</body>
</html>
